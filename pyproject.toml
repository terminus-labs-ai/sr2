# Workspace root — shared tooling, dev deps, and uv workspace config.
# Individual packages live under packages/*/

[tool.uv.workspace]
members = ["packages/*"]

[tool.uv.sources]
sr2 = { workspace = true }
sr2-bridge = { workspace = true }
sr2-runtime = { workspace = true }

[project]
name = "sr2-workspace"
version = "0.0.0"
description = "SR2 monorepo workspace root"
requires-python = ">=3.12"
dependencies = []

[project.optional-dependencies]
dev = [
    "sr2[mcp,a2a]",
    "sr2-bridge",
    "sr2-runtime[telegram,mcp,a2a,langgraph]",
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "pytest-cov>=4.0",
    "ruff>=0.3",
    "pre-commit>=3.0",
    "httpx>=0.27",
    "mkdocs>=1.6",
    "mkdocs-material>=9.5",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.ruff]
target-version = "py312"
line-length = 100
