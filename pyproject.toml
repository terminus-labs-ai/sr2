[project]
name = "sr2"
version = "1.0.0"
description = "Context engineering library for AI agents"
readme = "README.md"
requires-python = ">=3.12"
authors = [{name = "Terminus Labs"}]
license = {text = "Apache-2.0"}
keywords = ["context-engineering", "llm", "agents", "kv-cache", "tokens", "compaction", "summarization"]
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = [
    "pydantic>=2.0",
    "pyyaml>=6.0",
    "litellm>=1.0",
    "python-dotenv>=1.0",
    "aiosqlite>=0.20",
]

[project.urls]
Homepage = "https://sr2.dev"
Repository = "https://github.com/terminus-labs-ai/sr2"
Documentation = "https://sr2.dev/docs"

[project.optional-dependencies]
mcp = ["mcp>=1.0"]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "pytest-cov>=4.0",
    "ruff>=0.3",
    "pre-commit>=3.0",
    "httpx>=0.27",
    "mkdocs>=1.6",
    "mkdocs-material>=9.5",
]

[project.scripts]
sr2-config-docs = "schema_gen:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/sr2", "src/schema_gen.py"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.ruff]
target-version = "py312"
line-length = 100
