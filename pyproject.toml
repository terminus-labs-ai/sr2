# Workspace root — shared tooling, dev deps, and uv workspace config.
# Individual packages live under packages/*/

[tool.uv.workspace]
members = ["packages/*"]

[tool.uv.sources]
sr2 = { workspace = true }

[project]
name = "sr2-workspace"
version = "0.0.0"
description = "SR2 monorepo workspace root"
requires-python = ">=3.12"
dependencies = []

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "pytest-cov>=4.0",
    "ruff>=0.3",
    "pre-commit>=3.0",
    "httpx>=0.27",
    "langgraph>=0.2.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.ruff]
target-version = "py312"
line-length = 100
