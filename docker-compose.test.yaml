services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: postgres_test
    environment:
      POSTGRES_USER: sr2
      POSTGRES_PASSWORD: sr2
      POSTGRES_DB: sr2_test
    ports:
      - 54321:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sr2"]
      interval: 5s
      timeout: 5s
      retries: 5

networks:
  web:
    external: false 
  sr2:
    external: false
