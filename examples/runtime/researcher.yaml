name: researcher
description: "Example research agent"

model:
  provider: ollama
  name: qwen3.5:27b
  base_url: http://localhost:11434
  temperature: 0.3
  max_tokens: 4096

persona:
  system_prompt: |
    You are a research specialist. Investigate topics thoroughly
    and provide well-structured findings with evidence.

context:
  context_window: 32768
  conversation:
    active_turns: 8
    buffer_turns: 4
    compaction: summarize
  memory:
    enabled: true

tools: []

output:
  format: freeform
  max_tool_iterations: 10
