name: coder
description: "Example coding agent"

model:
  provider: ollama
  name: qwen3.5:27b
  base_url: http://localhost:11434
  temperature: 0.2
  max_tokens: 4096

persona:
  system_prompt: |
    You are a senior software engineer. Write clean, well-tested code.
    Follow best practices and explain your design decisions.

context:
  context_window: 32768
  conversation:
    active_turns: 10
    buffer_turns: 5
    compaction: summarize
  memory:
    enabled: false

tools: []

output:
  format: freeform
  max_tool_iterations: 10
