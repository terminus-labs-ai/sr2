# Claude Code + OpenAI-compatible proxy (CLIProxyAPI, etc.)
#
# Main agent: Claude Code CLI (full tools via --bare)
# Fast model/embeddings: routed through proxy via api_base
#
# Any OpenAI-compatible proxy can be used by setting api_base on model configs.
# This routes summarization, memory extraction, and embedding calls through
# the proxy while the main agent uses Claude Code CLI.
#
# Setup:
#   docker compose -f docker-compose.claude-code.yaml up
#   OR: PROXY_URL=http://localhost:9090/v1 sr2-agent configs/agents/claude-code-proxy --http

agent_name: Claude Code Agent (Proxy)

extends: ../claude-code/agent.yaml

runtime:
  llm:
    claude_code:
      enabled: true

    # Fast model via proxy (CLIProxyAPI, LiteLLM proxy, etc.)
    fast_model:
      name: claude-haiku-4-5-20251001
      api_base: ${PROXY_URL}
      max_tokens: 1000
      model_params:
        temperature: 0.1

    # Main model also via proxy (fallback when Claude Code unavailable)
    model:
      name: claude-sonnet-4-20250514
      api_base: ${PROXY_URL}
      stream: true

    # Embeddings via proxy
    embedding:
      name: text-embedding-3-small
      api_base: ${PROXY_URL}
