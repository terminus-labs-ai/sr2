agent_name: EDI

extends: ../../defaults.yaml

system_prompt: |
  You are EDI, a helpful development assistant.

  You help users with tasks like exploring codebases, answering questions about files, running commands, and tracking decisions made during a session.

  Guidelines:
  - Be concise. Prefer short answers unless the user asks for detail.
  - When exploring code, use tools to read files rather than guessing.
  - Track important decisions and user preferences expressed during the conversation.
  - If you previously discussed something relevant, reference it naturally.
  - When tool outputs are long, summarize the key findings rather than repeating everything.

pipeline:
  token_budget: 65536

  compaction:
    rules:
      - type: tool_output
        strategy: schema_and_sample
        max_compacted_tokens: 80
        recovery_hint: true
      - type: file_content
        strategy: reference
        include_metadata:
          - line_count
          - language
          - size
      - type: code_execution
        strategy: result_summary
        max_output_lines: 3
      - type: redundant_fetch
        strategy: supersede
      - type: confirmation
        strategy: collapse
  memory:
    key_schema:
      - prefix: "user.preference"
        description: "User preferences and settings"
      - prefix: "user.contact"
        description: "Contact information and relationships"
      - prefix: "project"
        description: "Project details and status"
      - prefix: "decision"
        description: "Decisions made during conversations"
  layers:
    - name: core
      cache_policy: immutable
      contents:
        - key: system_prompt
          source: config
          optional: false
        - key: tools
          source: config
          max_tokens: 8000

    - name: session
      cache_policy: append_only
      contents:
        - key: session_history
          source: session
          max_tokens: 12000
          optional: false
        - key: user_input
          source: input
          max_tokens: 2000
          optional: false

    - name: retrieval
      cache_policy: refresh_on_topic_shift
      contents:
        - key: retrieved_context
          source: retrieval
          max_tokens: 4000
          optional: true
  tool_masking:
    strategy: prefill

# --- Sessions ---
sessions:
  main_chat:
    max_turns: 200
    idle_timeout_minutes: 60
  _default:
    max_turns: 100
    idle_timeout_minutes: 30

# --- Tool Definitions ---
tool_definitions:
  - name: post_to_session
    description: "Post a message to a named session to notify the user"
    category: write
    parameters:
      - name: session
        type: string
        required: true
      - name: message
        type: string
        required: true
      - name: priority
        type: string
        enum: [urgent, important, normal]
        default: important

# --- Runtime config ---
runtime:
  database:
    url: "postgresql://sr2:sr2@postgres:5432/sr2"
    pool_min: 2
    pool_max: 10

  llm:
    model:
      name: ollama/llama3.1:8b
      api_base: http://ollama-exporter:8080
      max_tokens: 4096
      stream: true
      model_params:
        temperature: 0.4
    fast_model:
      name: ollama/llama3.2:3b
      api_base: http://ollama-exporter:8080
      max_tokens: 1000
      stream: true
      model_params:
        temperature: 0.1

    max_iterations: 15

mcp_servers:
  - name: searxng
    url: npx -y mcp-searxng
    transport: stdio
    env:
      SEARXNG_URL: http://searxng:8765
    tools:
      - searxng_web_search
      - web_url_read

  - name: filesystem
    url: npx -y @modelcontextprotocol/server-filesystem /tmp
    transport: stdio
    expose_prompts_as_tools: false
    tools:
      - read_text_file
      - read_media_file
      - read_multiple_files
      - edit_file
      - write_file
      - search_files
      - move_file
      - create_directory
      - directory_tree
    args:
      - /home/workspace
