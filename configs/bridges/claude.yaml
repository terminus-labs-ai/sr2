bridge:
  port: 9200
  host: 0.0.0.0

  forwarding:
    upstream_url: https://cliproxyapi.bambs.xyz
    model: claude-sonnet-4-6
    fast_model: claude-haiku-4-5
    timeout_seconds: 300

  llm:
    summarization:
      model: ollama/llama3.2:3b
      api_base: https://ollama.bambs.xyz
      max_tokens: 2048

pipeline:
  compaction:
    enabled: true
    raw_window: 5
    rules:
      - type: tool_output
        strategy: schema_and_sample
        max_compacted_tokens: 80
        recovery_hint: true
      - type: file_content
        strategy: reference
      - type: code_execution
        strategy: result_summary
      - type: confirmation
        strategy: collapse

  summarization:
    enabled: true
    trigger: token_threshold
    threshold: 0.75
    preserve_recent_turns: 5
