<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SR2 Chat</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --border: #2a2d3a;
    --text: #e4e4e7;
    --text-muted: #71717a;
    --accent: #6366f1;
    --accent-hover: #818cf8;
    --user-bg: #1e293b;
    --agent-bg: #1a1d27;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }

  header .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #22c55e;
    flex-shrink: 0;
  }

  header .dot.offline { background: #ef4444; }

  header h1 {
    font-size: 16px;
    font-weight: 600;
  }

  header .subtitle {
    font-size: 13px;
    color: var(--text-muted);
    margin-left: auto;
  }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .message {
    max-width: 720px;
    width: 100%;
    margin: 0 auto;
    display: flex;
    gap: 12px;
  }

  .message .avatar {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .message.user .avatar {
    background: #334155;
  }

  .message.agent .avatar {
    background: var(--accent);
  }

  .message .content {
    padding: 12px 16px;
    border-radius: 12px;
    line-height: 1.6;
    font-size: 14px;
    white-space: pre-wrap;
    word-wrap: break-word;
    min-width: 0;
  }

  .message.user .content {
    background: var(--user-bg);
    border: 1px solid var(--border);
  }

  .message.agent .content {
    background: var(--agent-bg);
    border: 1px solid var(--border);
  }

  .message .content code {
    background: rgba(99, 102, 241, 0.15);
    padding: 2px 6px;
    border-radius: 4px;
    font-family: "SF Mono", "Fira Code", monospace;
    font-size: 13px;
  }

  .message .content pre {
    background: #0d0f14;
    padding: 12px 16px;
    border-radius: 8px;
    overflow-x: auto;
    margin: 8px 0;
    font-family: "SF Mono", "Fira Code", monospace;
    font-size: 13px;
    line-height: 1.5;
  }

  .typing {
    display: flex;
    gap: 4px;
    padding: 4px 0;
  }

  .typing span {
    width: 6px;
    height: 6px;
    background: var(--text-muted);
    border-radius: 50%;
    animation: bounce 1.4s infinite ease-in-out;
  }

  .typing span:nth-child(1) { animation-delay: 0s; }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
    40% { transform: scale(1); opacity: 1; }
  }

  #input-area {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  #input-area form {
    max-width: 720px;
    margin: 0 auto;
    display: flex;
    gap: 8px;
  }

  #input-area textarea {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 16px;
    color: var(--text);
    font-family: inherit;
    font-size: 14px;
    resize: none;
    outline: none;
    min-height: 44px;
    max-height: 160px;
    line-height: 1.5;
  }

  #input-area textarea:focus {
    border-color: var(--accent);
  }

  #input-area textarea::placeholder {
    color: var(--text-muted);
  }

  #input-area button {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 12px;
    padding: 0 20px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s;
    flex-shrink: 0;
    align-self: flex-end;
    height: 44px;
  }

  #input-area button:hover:not(:disabled) {
    background: var(--accent-hover);
  }

  #input-area button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  .welcome {
    text-align: center;
    color: var(--text-muted);
    margin: auto;
    padding: 48px 24px;
  }

  .welcome h2 {
    font-size: 20px;
    color: var(--text);
    margin-bottom: 8px;
  }

  .welcome p {
    font-size: 14px;
    line-height: 1.6;
  }
</style>
</head>
<body>

<header>
  <div class="dot" id="status-dot"></div>
  <h1 id="agent-name">SR2 Agent</h1>
  <span class="subtitle" id="agent-info"></span>
</header>

<div id="messages">
  <div class="welcome" id="welcome">
    <h2>Chat with your SR2 agent</h2>
    <p>Type a message below to get started.</p>
  </div>
</div>

<div id="input-area">
  <form id="chat-form">
    <textarea id="input" placeholder="Type a message..." rows="1" autofocus></textarea>
    <button type="submit" id="send-btn">Send</button>
  </form>
</div>

<script>
const messages = document.getElementById("messages");
const input = document.getElementById("input");
const form = document.getElementById("chat-form");
const sendBtn = document.getElementById("send-btn");
const welcome = document.getElementById("welcome");
const statusDot = document.getElementById("status-dot");
const agentName = document.getElementById("agent-name");
const agentInfo = document.getElementById("agent-info");

let sessionId = "web_" + Math.random().toString(36).slice(2, 10);
let sending = false;

// Auto-resize textarea
input.addEventListener("input", () => {
  input.style.height = "auto";
  input.style.height = Math.min(input.scrollHeight, 160) + "px";
});

// Shift+Enter for newline, Enter to send
input.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    form.dispatchEvent(new Event("submit"));
  }
});

// Check agent health on load
(async () => {
  try {
    const res = await fetch("/health");
    const data = await res.json();
    statusDot.classList.remove("offline");
    agentName.textContent = data.agent || "SR2 Agent";
    document.title = `${data.agent || "SR2"} — Chat`;
    const parts = [];
    if (data.plugins?.length) parts.push(`${data.plugins.length} plugin${data.plugins.length > 1 ? "s" : ""}`);
    if (data.mcp_servers?.length) parts.push(`${data.mcp_servers.length} MCP server${data.mcp_servers.length > 1 ? "s" : ""}`);
    if (parts.length) agentInfo.textContent = parts.join(" · ");
  } catch {
    statusDot.classList.add("offline");
    agentInfo.textContent = "offline";
  }
})();

function addMessage(role, text) {
  if (welcome) welcome.remove();

  const div = document.createElement("div");
  div.className = `message ${role}`;
  div.innerHTML = `
    <div class="avatar">${role === "user" ? "You" : "AI"}</div>
    <div class="content"></div>
  `;
  // Set text content safely, then do minimal formatting
  const content = div.querySelector(".content");
  content.textContent = text;
  // Simple code block formatting (``` blocks)
  const html = content.innerHTML
    .replace(/```([\s\S]*?)```/g, "<pre>$1</pre>")
    .replace(/`([^`]+)`/g, "<code>$1</code>");
  content.innerHTML = html;

  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
  return div;
}

function showTyping() {
  if (welcome) welcome.remove();
  const div = document.createElement("div");
  div.className = "message agent";
  div.id = "typing";
  div.innerHTML = `
    <div class="avatar">AI</div>
    <div class="content"><div class="typing"><span></span><span></span><span></span></div></div>
  `;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById("typing");
  if (el) el.remove();
}

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  const text = input.value.trim();
  if (!text || sending) return;

  sending = true;
  sendBtn.disabled = true;
  input.value = "";
  input.style.height = "auto";

  addMessage("user", text);
  showTyping();

  try {
    const res = await fetch("/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: text, session_id: sessionId }),
    });
    const data = await res.json();
    removeTyping();
    addMessage("agent", data.response || "(empty response)");
  } catch (err) {
    removeTyping();
    addMessage("agent", `Error: ${err.message}`);
  } finally {
    sending = false;
    sendBtn.disabled = false;
    input.focus();
  }
});
</script>

</body>
</html>
