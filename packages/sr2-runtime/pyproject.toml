[project]
name = "sr2-runtime"
version = "1.0.0"
description = "Agent harness for SR2 — HTTP, CLI, plugins, LLM loop, tool execution"
requires-python = ">=3.12"
dependencies = [
    "sr2>=1.0",
    "fastapi>=0.110",
    "uvicorn[standard]>=0.27",
]

[project.optional-dependencies]
telegram = ["python-telegram-bot>=21.0"]
mcp = ["mcp>=1.0"]
a2a = ["a2a-sdk>=0.3"]
langgraph = ["langgraph>=0.2.0"]
postgres = ["asyncpg>=0.29"]

[project.scripts]
sr2-agent = "sr2_runtime.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/sr2_runtime"]
