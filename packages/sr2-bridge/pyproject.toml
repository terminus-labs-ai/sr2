[project]
name = "sr2-bridge"
version = "1.0.0"
description = "HTTP proxy for LLM APIs — part of the SR2 ecosystem"
requires-python = ">=3.12"
authors = [{name = "Terminus Labs"}]
license = {text = "Apache-2.0"}
keywords = ["context-engineering", "llm", "proxy", "bridge", "ai"]
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = [
    "sr2>=1.0",
    "fastapi>=0.110",
    "uvicorn[standard]>=0.27",
    "httpx>=0.27",
]

[project.urls]
Homepage = "https://sr2.dev"
Repository = "https://github.com/terminus-labs-ai/sr2"
Documentation = "https://sr2.dev/docs"

[project.scripts]
sr2-bridge = "sr2_bridge.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/sr2_bridge"]
