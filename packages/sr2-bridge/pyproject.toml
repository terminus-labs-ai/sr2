[project]
name = "sr2-bridge"
version = "1.0.0"
description = "HTTP proxy for LLM APIs — part of the SR2 ecosystem"
requires-python = ">=3.12"
dependencies = [
    "sr2>=1.0",
    "fastapi>=0.110",
    "uvicorn[standard]>=0.27",
    "httpx>=0.27",
]

[project.scripts]
sr2-bridge = "sr2_bridge.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/sr2_bridge"]
